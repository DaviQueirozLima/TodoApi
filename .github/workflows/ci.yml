name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Baixa o código
      - name: Checkout
        uses: actions/checkout@v4

      # Instala .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Restaura dependências
      - name: Restore
        run: dotnet restore

      # Build
      - name: Build
        run: dotnet build --no-restore

      # Testes
      - name: Test
        run: dotnet test --no-build --verbosity normal

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      # Baixa o código
      - name: Checkout
        uses: actions/checkout@v4

      # Build da imagem Docker
      - name: Build Docker Image
        run: docker build -t todoapi ./TodoApi

      # Sobe container (teste básico)
      - name: Run Docker Container
        run: |
          docker run -d -p 5000:8080 --name todoapi_test todoapi
          sleep 10
          docker ps

      # Derruba container depois
      - name: Stop Container
        run: docker stop todoapi_test